<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TinyLLM Web UI</title>
  <style>
    :root {
      --bg:#0b1020; --panel:#111a33; --text:#e7ecff; --muted:#aab3e6; --accent:#5b8cff;
      --border:rgba(255,255,255,.12);
    }
    body {
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(91,140,255,.25), transparent), var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 980px; margin: 40px auto; padding: 0 16px; }
    .title { display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    h1 { margin:0; font-size: 22px; letter-spacing: .2px; }
    .hint { color: var(--muted); font-size: 13px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: rgba(17,26,51,.75);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    textarea {
      width:100%; min-height: 120px; resize: vertical;
      background: rgba(0,0,0,.18);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px;
      outline:none;
    }
    input[type="number"], input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,.18);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      outline:none;
    }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions { display:flex; gap: 12px; flex-wrap:wrap; margin-top: 12px; }
    button {
      border: 1px solid var(--border);
      background: rgba(91,140,255,.18);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease;
      font-weight:600;
    }
    button:hover { background: rgba(91,140,255,.28); }
    button:active { transform: translateY(1px); }
    .danger { background: rgba(255,99,99,.12); }
    .danger:hover { background: rgba(255,99,99,.20); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .out {
      white-space: pre-wrap;
      line-height: 1.5;
      min-height: 220px;
      background: rgba(0,0,0,.18);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      overflow:auto;
    }
    .small { font-size: 12px; color: var(--muted); }
    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }
    .pill {
      display:inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(91,140,255,.14);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>TinyLLM Web UI</h1>
      <div class="hint">
        Uses a small local API server (see <span class="pill">server.py</span>) and fetches generations from it.
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <label>Prompt</label>
        <textarea id="prompt" placeholder="Type a prompt for the model..."></textarea>

        <div class="actions">
          <button id="btnGenerate">Generate</button>
          <button class="danger" id="btnClear">Clear</button>
        </div>

        <div class="status" id="status"></div>
        <div class="small" style="margin-top:10px;">
          Tip: for best results use <b>temperature</b> near 0.7 and <b>repetition penalty</b> ~1.1–1.3.
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <div>
            <label>Max new tokens</label>
            <input type="number" id="maxNewTokens" min="1" max="2048" value="120" />
          </div>
          <div>
            <label>Temperature</label>
            <input type="number" id="temperature" step="0.05" min="0" max="2" value="0.7" />
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div>
            <label>Top-k</label>
            <input type="number" id="topK" min="0" max="500" value="40" />
          </div>
          <div>
            <label>Top-p</label>
            <input type="number" id="topP" step="0.01" min="0" max="1" value="0.9" />
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div>
            <label>Repetition penalty</label>
            <input type="number" id="repPenalty" step="0.05" min="0.5" max="2" value="1.2" />
          </div>
          <div>
            <label>Checkpoint</label>
            <input type="text" id="checkpoint" value="checkpoints/step_004500.pt" />
          </div>
        </div>

        <label style="margin-top:12px;">Output</label>
        <div class="out mono" id="output">(output will appear here)</div>
        <div class="small" style="margin-top:10px;">
          Server base URL:
          <span class="pill mono" id="baseUrlPill">http://localhost:8000</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const baseUrl = 'http://localhost:8000';
    document.getElementById('baseUrlPill').textContent = baseUrl;

    const outEl = document.getElementById('output');
    const statusEl = document.getElementById('status');

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function escapeHtml(s) {
      return s.replace(/[&<>\"]/g, (c) => ({'&':'&amp;','<':'<','>':'>','"':'"'}[c]));
    }

    document.getElementById('btnClear').addEventListener('click', () => {
      outEl.textContent = '';
      setStatus('');
    });

    document.getElementById('btnGenerate').addEventListener('click', async () => {
      const prompt = document.getElementById('prompt').value;
      const max_new_tokens = Number(document.getElementById('maxNewTokens').value);
      const temperature = Number(document.getElementById('temperature').value);
      const top_k = Number(document.getElementById('topK').value);
      const top_p = Number(document.getElementById('topP').value);
      const repetition_penalty = Number(document.getElementById('repPenalty').value);
      const checkpoint = document.getElementById('checkpoint').value.trim();

      if (!prompt.trim()) {
        setStatus('Please enter a prompt.');
        return;
      }

      outEl.textContent = '';
      setStatus('Generating...');

      try {
        const res = await fetch(baseUrl + '/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            checkpoint,
            max_new_tokens,
            temperature,
            top_k,
            top_p,
            repetition_penalty
          })
        });

        if (!res.ok) {
          const t = await res.text();
          throw new Error(`HTTP ${res.status}: ${t}`);
        }

        const data = await res.json();
        // Expect: { text: "..." }
        outEl.textContent = prompt + data.text;
        setStatus('Done.');
      } catch (err) {
        console.error(err);
        setStatus('Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
